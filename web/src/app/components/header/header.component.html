<div class="header-container">
  <div class="title">
    <h6>Web Develop and Geoportals</h6>
  </div>
  
  <div class="user-auth-section">
      <ng-container *ngIf="authService.isAuthenticated; else loggedOut">
          <span>Hola, <strong>{{ authService.username }}</strong></span>
          <a routerLink="/logout-form">Logout</a>
      </ng-container>
      <ng-template #loggedOut>
          <a routerLink="/login-form">Login</a>
      </ng-template>
  </div>
</div>
